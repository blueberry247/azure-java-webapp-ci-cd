#############################################################
# Azure DevOps Pipeline
#
# Project: Azure Java Web App CI/CD
# Author: Mohammed Farooq
#
# Purpose:
# Build a Java Web Application using Maven
# Publish the WAR file as a Pipeline Artifact
# Deploy the WAR file to Azure App Service
#############################################################

#############################################################
# Trigger
#############################################################

trigger:
- master

#############################################################
# Agent Pool
#############################################################

pool:
  vmImage: 'ubuntu-latest'

#############################################################
# Pipeline Stages
#############################################################

stages:

#############################################################
# Stage 1 - Build
#############################################################

- stage: Build
  displayName: 'Build Java Application'

  jobs:

  - job: Build
    displayName: 'Build with Maven'

    steps:

    #########################################################
    # Checkout Source
    #########################################################

    - checkout: self

    #########################################################
    # Build Java Application
    #########################################################

    - task: Maven@3
      displayName: 'Build using Maven'

      inputs:
        mavenPomFile: 'pom.xml'
        mavenOptions: '-Xmx3072m'

        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '17'
        jdkArchitectureOption: 'x64'

        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'

        goals: 'package'

    #########################################################
    # Locate WAR
    #########################################################

    - script: |
        echo "Finding WAR file..."
        find . -name "*.war"
      displayName: 'Locate WAR'

    #########################################################
    # Copy WAR
    #########################################################

    - task: CopyFiles@2
      displayName: 'Copy WAR'

      inputs:
        SourceFolder: '$(Build.SourcesDirectory)/webapp/target'
        Contents: '*.war'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    #########################################################
    # Publish Artifact
    #########################################################

    - task: PublishPipelineArtifact@1
      displayName: 'Publish WAR Artifact'

      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'java-webapp'

#############################################################
# Stage 2 - Deploy
#############################################################

- stage: Deploy
  displayName: 'Deploy to Azure Web App'

  dependsOn: Build

  jobs:

  - deployment: DeployWebApp
    displayName: 'Deploy WAR'

    environment: 'Production'

    strategy:
      runOnce:
        deploy:

          steps:

          #####################################################
          # Download Artifact
          #####################################################

          - download: current
            artifact: java-webapp

          #####################################################
          # Verify Download
          #####################################################

          - script: |
              echo "Downloaded files:"
              find $(Pipeline.Workspace)
            displayName: 'Verify Download'

          #####################################################
          # Rename WAR to ROOT.war
          #####################################################

          - script: |
              echo "Renaming webapp.war to ROOT.war..."
              cp $(Pipeline.Workspace)/java-webapp/webapp.war $(Pipeline.Workspace)/java-webapp/ROOT.war

              echo ""
              echo "Files after rename:"
              ls -l $(Pipeline.Workspace)/java-webapp
            displayName: 'Rename WAR to ROOT.war'

          #####################################################
          # Deploy ROOT.war
          #####################################################

          - task: AzureWebApp@1
            displayName: 'Deploy to Azure Web App'

            inputs:
              azureSubscription: 'devops'
              appType: 'webAppLinux'
              appName: 'devops-webapp-farooq'
              package: '$(Pipeline.Workspace)/java-webapp/ROOT.war'

          #####################################################
          # Deployment Complete
          #####################################################

          - script: |
              echo "=========================================="
              echo "Deployment Successful!"
              echo ""
              echo "Application URL:"
              echo "https://devops-webapp-farooq.azurewebsites.net"
              echo "=========================================="
            displayName: 'Deployment Complete'